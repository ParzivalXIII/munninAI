<!DOCTYPE html>
<html lang="en" data-theme="obsidian">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}MunninAI{% endblock %} — DevOps Intelligence</title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/static/images/raven.svg">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Tailwind CSS v4 (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- DaisyUI 5 (CDN) -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" />

  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@2"></script>

  <!-- Alpine.js (browser CDN build) -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="/static/css/custom.css">
</head>
<body class="min-h-screen bg-base-100 text-base-content" x-data="{ sidebarOpen: false }">

  <!-- ═══ Navbar ═══ -->
  <nav class="navbar navbar-obsidian sticky top-0 z-50 px-4 lg:px-6">
    <!-- Mobile menu button -->
    <div class="flex-none lg:hidden">
      <button @click="sidebarOpen = !sidebarOpen" class="btn btn-ghost btn-sm btn-square">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>
    </div>

    <!-- Left: Nav Links (desktop) -->
    <div class="flex-1 hidden lg:flex">
      <div class="flex items-center gap-1">
        <a href="/" class="sidebar-link {% if request.url.path == '/' %}active{% endif %}">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
          Dashboard
        </a>
        <a href="/incidents" class="sidebar-link {% if '/incidents' in request.url.path and 'respond' not in request.url.path %}active{% endif %}">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
          Incidents
        </a>
        <a href="/incidents/respond" class="sidebar-link {% if '/respond' in request.url.path %}active{% endif %}">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" /></svg>
          Respond
        </a>
        <a href="/postmortems" class="sidebar-link {% if '/postmortems' in request.url.path %}active{% endif %}">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
          Postmortems
        </a>
        <a href="/gaps" class="sidebar-link {% if '/gaps' in request.url.path %}active{% endif %}">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
          Knowledge Gaps
        </a>
      </div>
    </div>

    <!-- Center: Logo -->
    <div class="flex-1 flex justify-center">
      <a href="/" class="flex items-center gap-2">
        <img src="/static/images/raven.svg" alt="MunninAI" class="h-8 w-8">
        <span class="text-lg font-bold text-gradient-primary hidden sm:inline">MunninAI</span>
      </a>
    </div>

    <!-- Right: Actions -->
    <div class="flex-1 flex justify-end items-center gap-2">
      <!-- Theme Toggle -->
      <button @click="$store.theme.toggle()" class="btn btn-ghost btn-sm btn-circle" :aria-label="$store.theme.current === 'obsidian' ? 'Switch to light mode' : 'Switch to dark mode'">
        <svg x-show="$store.theme.current === 'obsidian'" class="h-5 w-5 fill-current" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M21.64,13a1,1,0,0,0-1.05-.14,8.05,8.05,0,0,1-3.37.73A8.15,8.15,0,0,1,9.08,5.49a8.59,8.59,0,0,1,.25-2A1,1,0,0,0,8,2.36,10.14,10.14,0,1,0,22,14.05,1,1,0,0,0,21.64,13Zm-9.5,6.69A8.14,8.14,0,0,1,7.08,5.22v.27A10.15,10.15,0,0,0,17.22,15.63a9.79,9.79,0,0,0,2.1-.22A8.11,8.11,0,0,1,12.14,19.73Z"/></svg>
        <svg x-show="$store.theme.current !== 'obsidian'" class="h-5 w-5 fill-current" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M5.64,17l-.71.71a1,1,0,0,0,0,1.41,1,1,0,0,0,1.41,0l.71-.71A1,1,0,0,0,5.64,17ZM5,12a1,1,0,0,0-1-1H3a1,1,0,0,0,0,2H4A1,1,0,0,0,5,12Zm7-7a1,1,0,0,0,1-1V3a1,1,0,0,0-2,0V4A1,1,0,0,0,12,5ZM5.64,7.05a1,1,0,0,0,.7.29,1,1,0,0,0,.71-.29,1,1,0,0,0,0-1.41l-.71-.71A1,1,0,0,0,4.93,6.34Zm12,.29a1,1,0,0,0,.7-.29l.71-.71a1,1,0,1,0-1.41-1.41L17,5.64a1,1,0,0,0,0,1.41A1,1,0,0,0,17.66,7.34ZM21,11H20a1,1,0,0,0,0,2h1a1,1,0,0,0,0-2Zm-9,8a1,1,0,0,0-1,1v1a1,1,0,0,0,2,0V20A1,1,0,0,0,12,19ZM18.36,17A1,1,0,0,0,17,18.36l.71.71a1,1,0,0,0,1.41,0,1,1,0,0,0,0-1.41ZM12,6.5A5.5,5.5,0,1,0,17.5,12,5.51,5.51,0,0,0,12,6.5Zm0,9A3.5,3.5,0,1,1,15.5,12,3.5,3.5,0,0,1,12,15.5Z"/></svg>
      </button>

      <a href="/demo" class="btn btn-sm btn-ghost text-accent">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
        <span class="hidden sm:inline">Demo</span>
      </a>
      <div class="tooltip tooltip-bottom" data-tip="Knowledge Graph Active">
        <div class="status-dot status-dot-healthy"></div>
      </div>
    </div>
  </nav>

  <!-- ═══ Mobile Sidebar Drawer ═══ -->
  <div x-show="sidebarOpen" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100" x-transition:leave="transition ease-in duration-150" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0" class="fixed inset-0 z-40 bg-black/50 lg:hidden" @click="sidebarOpen = false">
    <div class="w-64 h-full bg-base-200 border-r border-obsidian p-4" @click.stop>
      <div class="flex items-center gap-2 mb-6 px-2">
        <img src="/static/images/raven.svg" alt="MunninAI" class="h-8 w-8">
        <span class="text-lg font-bold text-gradient-primary">MunninAI</span>
      </div>
      <nav class="flex flex-col gap-1">
        <a href="/" class="sidebar-link {% if request.url.path == '/' %}active{% endif %}" @click="sidebarOpen = false">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
          Dashboard
        </a>
        <a href="/incidents" class="sidebar-link {% if '/incidents' in request.url.path and 'respond' not in request.url.path %}active{% endif %}" @click="sidebarOpen = false">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
          Incidents
        </a>
        <a href="/incidents/respond" class="sidebar-link {% if '/respond' in request.url.path %}active{% endif %}" @click="sidebarOpen = false">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" /></svg>
          Respond
        </a>
        <a href="/postmortems" class="sidebar-link {% if '/postmortems' in request.url.path %}active{% endif %}" @click="sidebarOpen = false">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
          Postmortems
        </a>
        <a href="/gaps" class="sidebar-link {% if '/gaps' in request.url.path %}active{% endif %}" @click="sidebarOpen = false">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
          Knowledge Gaps
        </a>
        <div class="divider my-2"></div>
        <a href="/demo" class="sidebar-link text-accent" @click="sidebarOpen = false">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
          Demo Mode
        </a>
      </nav>
    </div>
  </div>

  <!-- ═══ Main Content ═══ -->
  <main class="min-h-[calc(100vh-4rem)]">
    {% block content %}{% endblock %}
  </main>

  <!-- ═══ Footer ═══ -->
  <footer class="border-t border-obsidian py-4 px-6 text-center text-xs opacity-50">
    <span>MunninAI v0.1.0 — Powered by Cognee Cloud</span>
    <span class="mx-2">·</span>
    <span>The AI That Never Forgets</span>
  </footer>

  <!-- App JS -->
  <script src="/static/js/app.js"></script>

  {% block scripts %}{% endblock %}
</body>
</html>
