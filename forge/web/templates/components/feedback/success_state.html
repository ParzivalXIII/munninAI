{# Success State Component #}
{# Optional: success_message, success_title #}

<div class="flex flex-col items-center justify-center py-8 px-4 animate-fade-in">
  <div class="p-3 rounded-full bg-success/10 mb-4 glow-success">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-success" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
    </svg>
  </div>
  <h3 class="text-lg font-semibold text-success mb-1">{{ success_title | default('Success') }}</h3>
  {% if success_message is defined and success_message %}
  <p class="text-sm opacity-60 text-center max-w-md">{{ success_message }}</p>
  {% endif %}
</div>
